id: easy-httpbin-form
goal: |
  Start at httpbin.org/forms/post (an HTML pizza-order form). Fill the
  three customer-info text inputs as follows:
    - "Customer name"  →  alice
    - "Telephone"      →  5551234
    - "E-mail address" →  alice@example.com
  Then submit the form (click the "Submit order" button). httpbin
  echoes the form data on the response page (path /post).
start_url: "https://httpbin.org/forms/post"
difficulty: easy
tags:
  - easy
  - fill
  - public
  - interactive
  - pattern:httpbin_form_submit
verifier:
  kind: js
  expression: "(/^\\/post(\\?|$|\\/)/i.test(document.location.pathname) && /alice@example\\.com/i.test(document.body.innerText) && /\\balice\\b/i.test(document.body.innerText))"
