id: easy-wiki-html
goal: |
  Open the Wikipedia article about HTML and confirm the article credits
  Tim Berners-Lee as the originator. No login is required.
start_url: "https://en.wikipedia.org/wiki/HTML"
difficulty: easy
tags:
  - easy
  - extract
  - public
verifier:
  kind: js
  expression: "/tim berners-?lee/i.test(document.body.innerText)"
