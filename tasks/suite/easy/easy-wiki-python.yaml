id: easy-wiki-python
goal: |
  Open the Wikipedia article on the Python programming language. Confirm
  the article identifies the language's creator. No login is required;
  the verifier checks the article body for the canonical fact.
start_url: "https://en.wikipedia.org/wiki/Python_(programming_language)"
difficulty: easy
tags:
  - easy
  - extract
  - public
verifier:
  kind: js
  expression: "/guido van rossum/i.test(document.body.innerText)"
