id: easy-wiki-search-curl
goal: |
  Start at the Wikipedia main page. Use the on-page search box (the
  "Search Wikipedia" text input) to look up the query
  "cURL command line tool" and submit the search. The agent should
  arrive at the article /wiki/CURL — Wikipedia's article on the cURL
  command-line tool / libcurl library.
start_url: "https://en.wikipedia.org/wiki/Main_Page"
difficulty: easy
tags:
  - easy
  - search
  - public
  - interactive
  - pattern:wiki_search_box
verifier:
  kind: js
  expression: "(/^\\/wiki\\/cURL$/i.test(document.location.pathname) && /(\\bcURL\\b|libcurl|command[\\s-]?line)/i.test(document.body.innerText))"
