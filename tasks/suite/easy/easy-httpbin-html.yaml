id: easy-httpbin-html
goal: |
  Open httpbin.org/html, which serves the opening of Moby-Dick.
  Confirm the page credits Herman Melville as the author.
start_url: "https://httpbin.org/html"
difficulty: easy
tags:
  - easy
  - extract
  - public
verifier:
  kind: js
  expression: "/herman melville/i.test(document.body.innerText)"
