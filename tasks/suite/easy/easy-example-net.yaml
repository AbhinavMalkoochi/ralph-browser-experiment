id: easy-example-net
goal: |
  Visit example.net and verify the canonical placeholder page is shown.
  Same content as example.com / example.org; the agent only has to land
  on the page.
start_url: "https://example.net/"
difficulty: easy
tags:
  - easy
  - navigate
  - public
verifier:
  kind: js
  expression: "(/example domain/i.test(document.title) || /example domain/i.test(document.body.innerText))"
