id: easy-wiki-search-markdown
goal: |
  Use the Wikipedia search results page to look up "Markdown lightweight
  markup language". Confirm the resulting page contains a reference to
  Markdown.
start_url: "https://en.wikipedia.org/w/index.php?search=Markdown+lightweight+markup+language&title=Special%3ASearch&fulltext=1"
difficulty: easy
tags:
  - easy
  - search
  - public
verifier:
  kind: js
  expression: "/markdown/i.test(document.body.innerText)"
