id: easy-example-org
goal: |
  Visit example.org and verify the canonical "Example Domain" placeholder
  page is shown. No login is required; the agent only has to land on the
  page.
start_url: "https://example.org/"
difficulty: easy
tags:
  - easy
  - navigate
  - public
verifier:
  kind: js
  expression: "(/example domain/i.test(document.title) || /example domain/i.test(document.body.innerText))"
