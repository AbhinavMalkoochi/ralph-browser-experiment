id: easy-httpbin-headers
goal: |
  Open httpbin.org/headers, a JSON endpoint that echoes the request
  headers. Confirm the response page is at path /headers and contains
  the User-Agent the browser sent. This is a canary extraction task.
start_url: "https://httpbin.org/headers"
difficulty: easy
tags:
  - easy
  - extract
  - public
  - canary
  - pattern:httpbin_json_extract
verifier:
  kind: js
  expression: "(/^\\/headers/i.test(document.location.pathname) && /user-?agent/i.test(document.body.innerText))"
