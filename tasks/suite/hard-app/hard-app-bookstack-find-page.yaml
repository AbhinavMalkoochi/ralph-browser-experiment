id: hard-app-bookstack-find-page
goal: |
  You are signed in to a self-hosted BookStack at http://127.0.0.1:3003/.
  Navigate from the dashboard to the "Harness" book and open one of its
  seeded pages (titled "Page 1", "Page 2", or "Page 3"). Stop when you are on
  the page's view URL.
start_url: "http://127.0.0.1:3003/"
difficulty: hard
tags:
  - hard
  - app
  - app:bookstack
  - navigate
  - cross_page
verifier:
  kind: js
  expression: |
    (() => {
      const path = document.location.pathname || '';
      const onPage = /\/books\/[^/]+\/page\//i.test(path);
      const body = (document.body && document.body.innerText) || '';
      const matches = /page\s*[1-3]/i.test(body);
      const onHarness = /harness/i.test(path) || /harness/i.test(body);
      const ok = onPage && matches && onHarness;
      return { pass: ok, score: ok ? 1 : 0, reason: 'path=' + path + ' bodyMatches=' + matches };
    })();
