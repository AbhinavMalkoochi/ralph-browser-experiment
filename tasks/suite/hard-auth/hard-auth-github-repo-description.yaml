id: hard-auth-github-repo-description
goal: |
  Open the sandbox repository's main page (URL pattern
  https://github.com/<owner>/<repo>) and edit the repository "About"
  description so it contains the phrase "ralph-agent-ack". Use the
  in-page edit gear; do not call the API directly. The browser is
  already authenticated for the sandbox repo. Stop on the updated repo
  page.
start_url: "https://github.com/"
difficulty: hard
tags:
  - hard
  - real_site
  - auth
  - fill
  - cross_page
requires_env:
  - GITHUB_PAT
  - GITHUB_SANDBOX_REPO
auth:
  cookies:
    -
      name: user_session
      value: "${GITHUB_PAT}"
      domain: ".github.com"
      path: "/"
      secure: true
      httpOnly: true
      sameSite: Lax
  headers:
    Authorization: "Bearer ${GITHUB_PAT}"
verifier:
  kind: js
  expression: "/^\\/(?:[^/]+)\\/(?:[^/]+)\\/?$/.test(document.location.pathname) && /ralph-agent-ack/i.test(document.body.innerText)"
