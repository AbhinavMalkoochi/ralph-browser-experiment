id: hard-auth-npm-package-metadata
goal: |
  Open the npm package settings page for the sandbox package (URL pattern
  https://www.npmjs.com/package/<name>/access or .../settings) and update
  the package "description" field so it contains the phrase
  "ralph-agent-ack". DO NOT run npm publish; the edit happens entirely
  in the npm web UI. The browser already carries the npm auth cookie.
start_url: "https://www.npmjs.com/"
difficulty: hard
tags:
  - hard
  - real_site
  - auth
  - fill
  - cross_page
  - no_publish
requires_env:
  - NPM_AUTH_TOKEN
  - NPM_SANDBOX_PACKAGE
auth:
  cookies:
    -
      name: token
      value: "${NPM_AUTH_TOKEN}"
      domain: ".npmjs.com"
      path: "/"
      secure: true
      httpOnly: true
      sameSite: Lax
  headers:
    Authorization: "Bearer ${NPM_AUTH_TOKEN}"
verifier:
  kind: js
  expression: "/\\/package\\//.test(document.location.pathname) && /ralph-agent-ack/i.test(document.body.innerText)"
